version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: orbisvoice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbisvoice
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orbisvoice-network

  redis:
    image: redis:7-alpine
    container_name: orbisvoice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orbisvoice-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: orbisvoice-api
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/orbisvoice?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:3000/auth/google/callback
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_PROFESSIONAL: ${STRIPE_PRICE_PROFESSIONAL}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE}
      STRIPE_PRICE_AI_INFRA: ${STRIPE_PRICE_AI_INFRA}
      STRIPE_PRICE_LTD: ${STRIPE_PRICE_LTD}
      STRIPE_PRICE_LTD_HOSTING: ${STRIPE_PRICE_LTD_HOSTING}
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orbisvoice-network

networks:
  orbisvoice-network:


volumes:
  postgres_data:
  redis_data:
