name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-api:latest
          no-cache: true

      - name: Build and Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-web:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'SET_IN_GITHUB' }}
            NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
            NEXT_PUBLIC_APPCHECK_KEY: ${{ secrets.APPCHECK_KEY }}

      - name: Build and Push Voice Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.voice-gateway
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-voice-gateway:latest
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: "/opt/orbisvoice"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'Orbis8214Boss' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dev-orbis-secret-change-me' }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,POSTGRES_PASSWORD_ENCODED,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI
          script: |
            cd /opt/orbisvoice
            mkdir -p nginx/certs
            
            # Ensure firewall is open
            if command -v ufw > /dev/null; then
              ufw allow 80/tcp || true
              ufw allow 443/tcp || true
              ufw allow 4001/tcp || true
            fi

            echo "Preparing encoded credentials..."
            # URL encode the password for the DATABASE_URL (specifically the @ symbol)
            # Orbis@8214@ becomes Orbis%408214%40
            export POSTGRES_PASSWORD="Orbis@8214@"
            export ENCODED_PW="Orbis%408214%40"
            export DATABASE_URL="postgresql://postgres:${ENCODED_PW}@postgres:5432/orbisvoice?schema=public"
            
            echo "Checking environment presence..."
            echo "DATABASE_URL: postgresql://postgres:****@postgres:5432/orbisvoice"
            
            echo "Checking certificates..."
            ls -la nginx/certs/
            
            # Clean slate deployment steps
            echo "Performing Clean Slate (Nuke and Pave)..."
            docker compose -f docker-compose.prod.yml down || true
            docker system prune -af --volumes || true
            
            echo "Pulling latest images..."
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD DATABASE_URL=$DATABASE_URL docker compose -f docker-compose.prod.yml pull
            
            echo "Starting fresh containers..."
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD DATABASE_URL=$DATABASE_URL docker compose -f docker-compose.prod.yml up -d
            
            echo "Waiting for stabilization..."
            sleep 20
            
            echo "Syncing database schema..."
            docker exec -T orbisvoice-api-prod npx prisma db push --accept-data-loss || echo "Prisma push failed"
            
            echo "--- VERBOSE DIAGNOSTICS START ---"
            echo "1. File Layout:"
            ls -R /opt/orbisvoice
            
            echo "2. Port Usage (Host):"
            ss -tulpn | grep -E ":80|:443|:4001|:5440" || echo "No ports found"
            
            echo "3. Container Status & Logs:"
            docker ps -a
            echo "Nginx Logs:"
            docker logs orbisvoice-nginx-prod || echo "No nginx logs"
            echo "API Logs:"
            docker logs orbisvoice-api-prod || echo "No api logs"
            
            echo "4. Database Health Check:"
            docker exec orbisvoice-postgres-prod pg_isready -U postgres || echo "Postgres not ready"
            
            echo "5. Network Check:"
            docker network ls
            docker network inspect orbisvoice-prod-network || echo "Network missing"
            
            echo "--- VERBOSE DIAGNOSTICS END ---"
            
            docker system prune -f
