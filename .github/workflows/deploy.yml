name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-api:latest
          no-cache: true

      - name: Build and Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-web:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'SET_IN_GITHUB' }}
            NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
            NEXT_PUBLIC_APPCHECK_KEY: ${{ secrets.APPCHECK_KEY }}

      - name: Build and Push Voice Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.voice-gateway
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-voice-gateway:latest
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: "/opt/orbisvoice"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'Orbis8214Boss' }}
          POSTGRES_PASSWORD_ENCODED: ${{ secrets.POSTGRES_PASSWORD_ENCODED || 'Orbis%408214%40%40' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'dev-orbis-secret-change-me' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || 'SET_IN_GITHUB' }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || 'SET_IN_GITHUB' }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI || 'https://myorbisvoice.com/auth/google/callback' }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,POSTGRES_PASSWORD_ENCODED,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI
          script: |
            cd /opt/orbisvoice
            mkdir -p nginx/certs
            
            # Ensure firewall is open
            if command -v ufw > /dev/null; then
              ufw allow 80/tcp || true
              ufw allow 443/tcp || true
              ufw allow 4001/tcp || true
            fi

            echo "Exporting environment variables..."
            export POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            export POSTGRES_PASSWORD_ENCODED=$POSTGRES_PASSWORD_ENCODED
            export JWT_SECRET=$JWT_SECRET
            export GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            export GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            export GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI
            
            echo "Checking environment presence..."
            [ -z "$POSTGRES_PASSWORD" ] && echo "WARNING: POSTGRES_PASSWORD is empty" || echo "POSTGRES_PASSWORD is set"
            [ -z "$POSTGRES_PASSWORD_ENCODED" ] && echo "WARNING: POSTGRES_PASSWORD_ENCODED is empty" || echo "POSTGRES_PASSWORD_ENCODED is set"
            
            echo "Checking certificates..."
            ls -la nginx/certs/
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            echo "Waiting for containers to stabilize..."
            sleep 15
            
            echo "--- Container Status ---"
            docker compose -f docker-compose.prod.yml ps
            
            echo "--- Nginx Config Test ---"
            docker exec orbisvoice-nginx-prod nginx -t || true
            
            echo "--- Nginx Error Logs ---"
            docker logs orbisvoice-nginx-prod
            
            echo "--- API Logs ---"
            docker logs orbisvoice-api-prod --tail 50
            
            docker system prune -f
