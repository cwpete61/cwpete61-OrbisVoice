name: Deploy to Production

on:
  push:
    branches: [ master ]

env:
  OWNER_LC: ${{ github.repository_owner }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
  FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
  APPCHECK_KEY: ${{ secrets.APPCHECK_KEY }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  VPS_IP: ${{ secrets.VPS_IP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
  TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          # Use OWNER_LC as a real environment variable for subsequent steps
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-api:latest
          no-cache: true

      - name: Build and Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-web:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID || 'SET_IN_GITHUB' }}
            NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY: ${{ env.FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ env.FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID: ${{ env.FIREBASE_APP_ID }}
            NEXT_PUBLIC_APPCHECK_KEY: ${{ env.APPCHECK_KEY }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ env.TURNSTILE_SITE_KEY }}

      - name: Build and Push Voice Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.voice-gateway
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-voice-gateway:latest
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_IP }}
          username: root
          key: ${{ env.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: "/opt/orbisvoice"

      - name: Prepare Database URL
        id: db-url
        run: |
          # Use node to safely URL encode the password on the runner
          PW="${{ env.POSTGRES_PASSWORD || 'Orbis@8214@@' }}"
          ENCODED_PW=$(node -e "console.log(encodeURIComponent(process.argv[1]))" "$PW")
          echo "DATABASE_URL=postgresql://postgres:${ENCODED_PW}@postgres:5432/orbisvoice?schema=public" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=$PW" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_IP }}
          username: root
          key: ${{ env.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,DATABASE_URL,JWT_SECRET,TURNSTILE_SITE_KEY,TURNSTILE_SECRET_KEY
          script: |
            cd /opt/orbisvoice
            mkdir -p nginx/certs
            
            # Ensure firewall is open
            if command -v ufw > /dev/null; then
              ufw allow 80/tcp || true
              ufw allow 443/tcp || true
              ufw allow 4001/tcp || true
            fi
            
            echo "Environment variables passed. Constructing fresh deployment..."
            export JWT_SECRET="${{ env.JWT_SECRET || 'dev-orbis-secret-change-me' }}"
            
            echo "Checking certificates..."
            ls -la nginx/certs/
            
            # Clean slate deployment steps
            echo "Performing Hard Reset (including volumes)..."
            docker compose -f docker-compose.prod.yml down --volumes || true
            docker system prune -af --volumes || true
            
            echo "Pulling latest images..."
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD DATABASE_URL=$DATABASE_URL docker compose -f docker-compose.prod.yml pull
            
            echo "Starting fresh containers..."
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD DATABASE_URL=$DATABASE_URL TURNSTILE_SITE_KEY=$TURNSTILE_SITE_KEY TURNSTILE_SECRET_KEY=$TURNSTILE_SECRET_KEY docker compose -f docker-compose.prod.yml up -d
            
            echo "Wait for Database to be ready..."
            for i in {1..10}; do
              if docker exec -T orbisvoice-postgres-prod pg_isready -h localhost -U postgres; then
                echo "Postgres is READY"
                break
              fi
              echo "Waiting for Postgres... ($i/10)"
              sleep 5
            done
            
            echo "Performing Out-of-Band Database Migration..."
            docker run --rm --network orbisvoice-prod-network \
              -e DATABASE_URL=$DATABASE_URL \
              ghcr.io/cwpete61/orbisvoice-api:latest \
              npx prisma db push --accept-data-loss > prisma_push.log 2>&1
            cat prisma_push.log
            
            echo "Testing Database Connection (via API)..."
            docker exec -T orbisvoice-api-prod node -e "const { PrismaClient } = require('@prisma/client'); const prisma = new PrismaClient(); prisma.\$queryRaw\`SELECT 1\`.then(() => console.log('DB_CONNECTION_SUCCESS')).catch(err => { console.error('DB_CONNECTION_FAILED:', err.message); process.exit(1); })" || echo "Database test failed"
            
            echo "### deployment Diagnostics" > deployment_report.md
            echo "#### Prisma Push Log (Out-of-Band)" >> deployment_report.md
            echo '```' >> deployment_report.md
            cat prisma_push.log >> deployment_report.md
            echo '```' >> deployment_report.md
            
            echo "#### API Logs (Last 50 lines)" >> deployment_report.md
            echo '```' >> deployment_report.md
            docker logs orbisvoice-api-prod --tail 50 >> deployment_report.md 2>&1 || echo "No api logs" >> deployment_report.md
            echo '```' >> deployment_report.md
            
            echo "#### Port Usage (Host)" >> deployment_report.md
            echo '```' >> deployment_report.md
            ss -tulpn | grep -E "80|443|4001|5440" >> deployment_report.md || echo "No tracked ports in use" >> deployment_report.md
            echo '```' >> deployment_report.md
            
            echo "#### Container Status" >> deployment_report.md
            echo '```' >> deployment_report.md
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" >> deployment_report.md
            echo '```' >> deployment_report.md

            echo "#### Nginx Logs (Tail 30)" >> deployment_report.md
            echo '```' >> deployment_report.md
            docker logs orbisvoice-nginx-prod --tail 30 >> deployment_report.md 2>&1 || echo "No nginx logs" >> deployment_report.md
            echo '```' >> deployment_report.md

            echo "#### API Logs (Tail 50)" >> deployment_report.md
            echo '```' >> deployment_report.md
            docker logs orbisvoice-api-prod --tail 50 >> deployment_report.md 2>&1 || echo "No api logs" >> deployment_report.md
            echo '```' >> deployment_report.md
            
            cp deployment_report.md $GITHUB_STEP_SUMMARY || true
            
            docker system prune -f

      - name: Git Telemetry
        run: |
          git config --global user.name "Deployment Bot"
          git config --global user.email "bot@orbisvoice.app"
          git fetch origin telemetry || git checkout -b telemetry
          git checkout telemetry
          # We need to get the file from the VPS back to the runner
          # Since scp-action only goes one way, we use a trick or just use the summary
          # Actually, the best way is to cat it in a step and redirect it
        env:
          SSH_PRIVATE_KEY: ${{ env.SSH_PRIVATE_KEY }}

      - name: Fetch Telemetry
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ env.VPS_IP }}:/opt/orbisvoice/deployment_report.md .

      - name: Push Telemetry to Branch
        run: |
          git config --global user.name "Deployment Bot"
          git config --global user.email "bot@orbisvoice.app"
          git checkout -b telemetry || git checkout telemetry
          git add deployment_report.md
          git commit -m "chore(telemetry): update deployment report [skip ci]" || echo "No changes to commit"
          git push origin telemetry --force
