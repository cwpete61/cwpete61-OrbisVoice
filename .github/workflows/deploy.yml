name: Deploy to Production

on:
  workflow_dispatch:
    # Auto-deploy disabled — webhook server on VPS handles deploys.
    # Run this manually only for emergency/rollback situations.

env:
  OWNER_LC: ${{ github.repository_owner }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
  FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
  FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
  FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
  APPCHECK_KEY: ${{ secrets.APPCHECK_KEY }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  VPS_IP: ${{ secrets.VPS_IP }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
  TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
  STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
  FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
  INTERNAL_SERVICE_KEY: ${{ secrets.INTERNAL_SERVICE_KEY }}
  RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}

concurrency:
  group: "production-deployment-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-api:latest
          no-cache: true

      - name: Build and Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-web:latest
          no-cache: true
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ env.GOOGLE_CLIENT_ID || 'SET_IN_GITHUB' }}
            NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY: ${{ env.FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ env.FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID: ${{ env.FIREBASE_APP_ID }}
            NEXT_PUBLIC_APPCHECK_KEY: ${{ env.APPCHECK_KEY }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ env.TURNSTILE_SITE_KEY }}

      - name: Build and Push Voice Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.voice-gateway
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-voice-gateway:latest
          no-cache: true

      - name: Build and Push Commerce Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.commerce-agent
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/orbisvoice-commerce-agent:latest
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_IP }}
          username: root
          key: ${{ env.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,nginx/,deploy-vps.sh"
          target: "/opt/orbisvoice"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: STRIPE_API_KEY,STRIPE_WEBHOOK_SECRET,OPENAI_API_KEY,GEMINI_API_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,FIREBASE_PROJECT_ID,FIREBASE_CLIENT_EMAIL,FIREBASE_PRIVATE_KEY,TURNSTILE_SITE_KEY,TURNSTILE_SECRET_KEY,POSTGRES_PASSWORD,DATABASE_URL,JWT_SECRET,INTERNAL_SERVICE_KEY,RECAPTCHA_SECRET_KEY
          script: |
            cd /opt/orbisvoice
            # Create certs dir if missing
            mkdir -p nginx/certs
            
            echo "Constructing fresh deployment via script with injected secrets..."
            chmod +x deploy-vps.sh
            
            # Export everything for docker-compose to see
            export STRIPE_API_KEY=$STRIPE_API_KEY
            export STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
            export OPENAI_API_KEY=$OPENAI_API_KEY
            export GEMINI_API_KEY=$GEMINI_API_KEY
            export GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            export GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            export FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
            export FIREBASE_CLIENT_EMAIL=$FIREBASE_CLIENT_EMAIL
            export FIREBASE_PRIVATE_KEY=$FIREBASE_PRIVATE_KEY
            export TURNSTILE_SITE_KEY=$TURNSTILE_SITE_KEY
            export TURNSTILE_SECRET_KEY=$TURNSTILE_SECRET_KEY
            export POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            export DATABASE_URL=$DATABASE_URL
            export COMMERCE_DATABASE_URL=${DATABASE_URL%/*}/orbisvoice_commerce
            export INTERNAL_SERVICE_KEY=$INTERNAL_SERVICE_KEY
            export RECAPTCHA_SECRET_KEY=$RECAPTCHA_SECRET_KEY
            export JWT_SECRET=$JWT_SECRET
            
            ./deploy-vps.sh
            
            # Sync Commerce DB
            echo "🔄 Syncing Commerce Database..."
            docker exec orbisvoice-commerce-agent-prod npx prisma db push --schema=prisma/schema.prisma --accept-data-loss

            
            echo "### deployment Diagnostics" > deployment_report.md
            
            echo "#### Environment Check" >> deployment_report.md
            echo '```' >> deployment_report.md
            if [ -f .env ]; then
              echo ".env file exists"
              grep "STRIPE_API_KEY" .env | sed 's/=.*$/=REDACTED/' >> deployment_report.md
            else
              echo ".env file MISSING" >> deployment_report.md
            fi
            echo '```' >> deployment_report.md

            echo "#### Container Status" >> deployment_report.md
            echo '```' >> deployment_report.md
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" >> deployment_report.md
            echo '```' >> deployment_report.md
            
            echo "#### API Logs (Last 100 lines)" >> deployment_report.md
            echo '```' >> deployment_report.md
            docker logs --tail 100 orbisvoice-api-prod 2>&1 >> deployment_report.md || echo "No api logs" >> deployment_report.md
            echo '```' >> deployment_report.md
            
            cp deployment_report.md $GITHUB_STEP_SUMMARY || true
            docker system prune -f

      - name: Fetch Telemetry
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ env.VPS_IP }}:/opt/orbisvoice/deployment_report.md .

      - name: Push Telemetry to Branch
        run: |
          git config --global user.name "Deployment Bot"
          git config --global user.email "bot@orbisvoice.app"
          git checkout -b telemetry || git checkout telemetry
          git add deployment_report.md
          git commit -m "chore(telemetry): update deployment report [skip ci]" || echo "No changes to commit"
          git push origin telemetry --force
