services:
  postgres:
    image: postgres:15-alpine
    container_name: orbisvoice-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Orbis8214Boss}
      POSTGRES_DB: orbisvoice
    ports:
      - "5440:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orbisvoice-prod-network

  redis:
    image: redis:7-alpine
    container_name: orbisvoice-redis-prod
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orbisvoice-prod-network

  api:
    image: ghcr.io/cwpete61/orbisvoice-api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: orbisvoice-api-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-orbis-secret-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://myorbisvoice.com,https://www.myorbisvoice.com}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-SET_IN_GITHUB}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-SET_IN_GITHUB}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://myorbisvoice.com/auth/google/callback}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orbisvoice-prod-network
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/cwpete61/orbisvoice-web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
        - NEXT_PUBLIC_APPCHECK_KEY=${NEXT_PUBLIC_APPCHECK_KEY}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY}
    container_name: orbisvoice-web-prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://myorbisvoice.com/api}
      NEXT_PUBLIC_VOICE_GATEWAY_URL: ${NEXT_PUBLIC_VOICE_GATEWAY_URL:-wss://myorbisvoice.com/voice}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
    depends_on:
      api:
        condition: service_started
    networks:
      - orbisvoice-prod-network

  voice-gateway:
    image: ghcr.io/cwpete61/orbisvoice-voice-gateway:latest
    build:
      context: .
      dockerfile: Dockerfile.voice-gateway
    container_name: orbisvoice-voice-gateway-prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-orbis-secret-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orbisvoice-prod-network

  nginx:
    image: nginx:alpine
    container_name: orbisvoice-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
      - voice-gateway
    networks:
      - orbisvoice-prod-network

  commerce-agent:
    image: ghcr.io/cwpete61/orbisvoice-commerce-agent:latest
    container_name: orbisvoice-commerce-agent-prod
    restart: always
    environment:
      NODE_ENV: production
      COMMERCE_PORT: 4005
      DATABASE_URL: ${COMMERCE_DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CORE_API_URL: http://api:4001
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orbisvoice-prod-network

networks:
  orbisvoice-prod-network:
    name: orbisvoice-prod-network


volumes:
  postgres_prod_data:
  redis_prod_data:
